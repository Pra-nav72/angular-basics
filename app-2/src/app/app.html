<h1>To Do List</h1>

<div>
  <input type="text"  (keydown)="addTask1($event.key)" [value]="title()" placeholder="add new task" (input)="title.set($event.target.value)">
  <button (click)="addTask()" class="primary">add tasks</button>
  <ul>
    @for(user of tasks(); track user.id){
      <li>
        <span>{{$index + 1}}. </span>  
        <span>{{user.title}}      </span>
        <span><button (click)="deleteTasks($index)">delete</button></span>
      </li>
    }
    @empty{
      <br>
      <span>No Task Found!</span>
    }
  </ul>
</div>
